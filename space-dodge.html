<!DOCTYPE html>
<html>
<head>
  <title>🚀 Space Dodge PRO</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial;
      color: white;
      text-align: center;
    }

    #menu {
      position: absolute;
      width: 100%;
      top: 40%;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
      cursor: pointer;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>

<div id="menu">
  <h1>🚀 Space Dodge 🚀</h1>
  <button onclick="startGame()">Jouer</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== IMAGES =====
const background = new Image();
background.src = "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa";

const ship = new Image();
ship.src = "https://cdn-icons-png.flaticon.com/512/2920/2920056.png";

// météorites différentes
const meteor1 = new Image(); // normale
meteor1.src = "https://cdn-icons-png.flaticon.com/512/616/616554.png";

const meteor2 = new Image(); // rapide
meteor2.src = "https://cdn-icons-png.flaticon.com/512/481/481874.png";

const meteor3 = new Image(); // grosse
meteor3.src = "https://cdn-icons-png.flaticon.com/512/616/616529.png";

// chargement images
let imagesLoaded = 0;
[background, ship, meteor1, meteor2, meteor3].forEach(img => {
  img.onload = () => {
    imagesLoaded++;
    if (imagesLoaded === 5) update();
  };
});

// ===== VARIABLES =====
let player, obstacles, score, gameOver, keys = {}, gameStarted = false;

// ===== TYPES MÉTÉORITES =====
function createObstacle() {
  let rand = Math.random();

  if (rand < 0.5) {
    return {
      x: Math.random() * (canvas.width - 50),
      y: -50,
      width: 50,
      height: 50,
      speed: 7 + score / 150,
      img: meteor1
    };
  } 
  else if (rand < 0.8) {
    return {
      x: Math.random() * (canvas.width - 30),
      y: -30,
      width: 30,
      height: 30,
      speed: 11 + score / 120,
      img: meteor2
    };
  } 
  else {
    return {
      x: Math.random() * (canvas.width - 90),
      y: -90,
      width: 90,
      height: 90,
      speed: 4 + score / 200,
      img: meteor3
    };
  }
}

// ===== START =====
function startGame() {
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";

  player = {
    x: canvas.width / 2,
    y: canvas.height - 100,
    width: 70,
    height: 70,
    speed: 12
  };

  obstacles = [];
  score = 0;
  gameOver = false;
  gameStarted = true;
}

// ===== CONTROLES =====
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ===== COLLISION =====
function collision(a, b) {
  return a.x < b.x + b.width &&
         a.x + a.width > b.x &&
         a.y < b.y + b.height &&
         a.y + a.height > b.y;
}

// ===== BOUCLE =====
function update() {
  requestAnimationFrame(update);

  if (!gameStarted) return;

  ctx.drawImage(background, 0, 0, canvas.width, canvas.height);

  if (!gameOver) {

    // mouvements
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;
    if (keys["ArrowUp"]) player.y -= player.speed;
    if (keys["ArrowDown"]) player.y += player.speed;

    // limites
    player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

    // joueur
    ctx.drawImage(ship, player.x, player.y, player.width, player.height);

    // obstacles
    for (let i = 0; i < obstacles.length; i++) {
      let o = obstacles[i];
      o.y += o.speed;

      ctx.drawImage(o.img, o.x, o.y, o.width, o.height);

      if (collision(player, o)) {
        gameOver = true;
      }
    }

    // score
    score++;
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Score: " + score, 20, 30);

  } else {
    ctx.fillStyle = "white";
    ctx.font = "50px Arial";
    ctx.fillText("GAME OVER", canvas.width / 2 - 150, canvas.height / 2);

    ctx.font = "25px Arial";
    ctx.fillText("Clique pour rejouer", canvas.width / 2 - 130, canvas.height / 2 + 50);
  }
}

// ===== SPAWN =====
setInterval(() => {
  if (gameStarted && !gameOver) {
    obstacles.push(createObstacle());
    obstacles.push(createObstacle());

    if (score > 500) obstacles.push(createObstacle());
    if (score > 1500) obstacles.push(createObstacle());
  }
}, 300);

// ===== RESTART =====
canvas.addEventListener("click", () => {
  if (gameOver) startGame();
});
</script>

</body>
</html>
